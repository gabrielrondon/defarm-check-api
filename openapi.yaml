paths:
  /check:
    post:
      tags:
        - check
      summary: Execute compliance check
      description: |
        Executa verificação de compliance socioambiental para um input (CNPJ, CPF, CAR, coordenadas ou endereço).

        A API consulta múltiplas fontes em paralelo e retorna um veredito agregado com score de 0-100.

        **Tipos de Input:**
        - **CNPJ/CPF**: Documentos de pessoa física ou jurídica (com ou sem formatação)
        - **CAR**: Número do Cadastro Ambiental Rural (formato: UF-MUNICÍPIO-CÓDIGO)
        - **COORDINATES**: Coordenadas GPS (lat/lon em decimal WGS84)
        - **ADDRESS**: Endereço brasileiro em texto livre (geocodificado automaticamente)

        ---

        ## 🔍 Checkers Executados Automaticamente

        A API executa até **30 checkers** em paralelo, dependendo do tipo de input:

        ### Social & Legal (CNPJ/CPF)
        - **Slave Labor Registry**: Lista Suja do Trabalho Escravo (MTE)
        - **CGU Sanctions**: Sanções federais (CEIS, CNEP, CEAF)

        ### Environmental - Document-based (CNPJ/CPF)
        - **IBAMA Embargoes**: Embargos ambientais por documento

        ### Environmental - CAR-based
        - **CAR Registry**: Status do CAR (ativo/cancelado/suspenso)
        - **🔄 CAR x PRODES Intersection**: Cruza geometria do CAR com polígonos PRODES para detectar desmatamento DENTRO da propriedade ⭐
        - **MapBiomas Validated Deforestation**: Desmatamento validado por analistas dentro do CAR
        - **MapBiomas Territory Intelligence**: Informações territoriais (bioma, TIs, UCs) e alertas via MapBiomas Alerta
        - **Reserva Legal Compliance (MapBiomas)**: Conformidade da Reserva Legal — cruza alertas de desmatamento com a RL declarada no CAR
        - **Land Use Conversion History (MapBiomas)**: Trajetória uso do solo 1985–2024 — detecta conversão de nativo para antrópico e corte temporal do Código Florestal
        - **Productivity vs Regional Benchmark (MODIS NPP)**: Compara NPP da propriedade com benchmark do bioma — detecta sub-utilização e abandono
        - **Fire Scar Mapping (MODIS MCD64A1)**: Cicatrizes de incêndio confirmadas por satélite (últimos 3 anos, 500m)
        - **Phenology & Crop Cycles (MODIS)**: Detecta ciclos de plantio/colheita, dupla safra, irrigação e abandono via fenologia NDVI
        - **Carbon Stock Estimation (MODIS VCF)**: Estima AGB e CO2eq da propriedade via cobertura arbórea (MOD44B 250m)
        - **Water Body Monitoring (MODIS)**: Monitora corpos d'água e áreas úmidas — detecta desaparecimento e violação de APP
        - **NDVI Productivity (MODIS)**: Índice de produtividade NDVI via NASA MODIS (3 anos, resolução 250m)
        - **Pasture Degradation Index (MODIS)**: Degradação de pastagem via NDVI MODIS + focos de queimada (PQI 0-100)
        - **Grazing Pattern Analyzer (MODIS)**: Detecta eventos de pastejo, tempo de recuperação e regularidade de rotação (CV) via série NDVI anual
        - **INPE Fire Hotspots**: Focos de calor/queimadas dentro do CAR (últimos 90 dias)
        - **ANA Water Use Permits**: Outorgas de uso de água próximas ao CAR
        - **Soil Exposure & Erosion Risk (Sentinel-2)**: Bare Soil Index (BSI) Sentinel-2 L2A (10m) — detecta solo exposto prolongado e risco de erosão
        - **Irrigation Detection (Sentinel-2 NDMI)**: NDMI Sentinel-2 L2A (10m) — detecta irrigação na estação seca e cruza com outorgas ANA
        - **Crop Mapping (Sentinel-2 NDVI)**: Séries temporais NDVI Sentinel-2 (10m, 16-day) — classifica cobertura, detecta dupla safra e expansão agrícola

        ### Environmental - Spatial (COORDINATES/ADDRESS) 🌎 Brasil only
        - **PRODES Deforestation**: Verifica se coordenadas caem em polígono de desmatamento histórico
        - **DETER Real-Time Alerts**: Alertas de desmatamento em tempo real (últimos 90 dias)
        - **Indigenous Lands**: Verifica sobreposição com Terras Indígenas (FUNAI)
        - **Conservation Units**: Verifica sobreposição com UCs (ICMBio)
        - **IBAMA Embargoes (Spatial)**: Embargos em buffer de 5km das coordenadas
        - **MapBiomas Territory Intelligence**: Alertas de desmatamento validados próximos às coordenadas + contexto territorial
        - **Land Use Conversion History (MapBiomas)**: Trajetória histórica de uso do solo para o ponto (1985–2024)
        - **INPE Fire Hotspots**: Focos de calor próximos às coordenadas
        - **ANA Water Use Permits**: Outorgas próximas às coordenadas

        ### Environmental - Satellite (COORDINATES) 🌍 Todos os países (BR, UY, AR, PY, BO, CL, CO, PE)
        > Checkers baseados em dados globais de satélite — funcionam para qualquer coordenada nos 8 países suportados.
        - **NDVI Productivity (MODIS)**: Produtividade NDVI para coordenadas (ORNL DAAC MOD13Q1, 250m)
        - **Pasture Degradation Index (MODIS)**: Degradação de pastagem via NDVI MODIS + focos de queimada (PQI 0-100)
        - **Grazing Pattern Analyzer (MODIS)**: Detecta eventos de pastejo, tempo de recuperação e regularidade de rotação via série temporal NDVI
        - **Productivity vs Regional Benchmark (MODIS NPP)**: NPP da localização vs benchmark do bioma (MOD17A3HGF, 500m)
        - **Fire Scar Mapping (MODIS MCD64A1)**: Cicatrizes de incêndio confirmadas por satélite
        - **Phenology & Crop Cycles (MODIS)**: Ciclos de vegetação, fenologia e detecção de mudança de uso
        - **Carbon Stock Estimation (MODIS VCF)**: Estimativa de biomassa e carbono estocado
        - **Water Body Monitoring (MODIS)**: Monitoramento de corpos d'água e áreas úmidas
        - **Soil Exposure & Erosion Risk (Sentinel-2)**: Solo exposto e risco de erosão via BSI Sentinel-2 (10m)
        - **Irrigation Detection (Sentinel-2 NDMI)**: Irrigação na estação seca via NDMI Sentinel-2 (10m)
        - **Crop Mapping (Sentinel-2 NDVI)**: Classificação de cobertura e ciclos agrícolas via NDVI Sentinel-2 (10m)

        ### Positive/Certification (CNPJ)
        - **MAPA Organic Certification**: Certificação orgânica (quando disponível)

        ### Uruguay (RUC/CI)
        - **SNAP Protected Areas**: Sobreposição com Sistema Nacional de Áreas Protegidas
        - **DICOSE Rural Registry**: Registro de estabelecimento rural/pecuário

        ### Argentina (CUIT/CUIL)
        - **REPSAL - Sanciones Laborales**: Registro Público de Empleadores con Sanciones Laborales — infrações trabalhistas ativas (trabalho não registrado, trabalho infantil, trata de personas)

        ---

        ## 🔑 Credenciais Necessárias por Checker

        | Checker Group | Env Var | Fallback |
        |---|---|---|
        | MapBiomas Territory + Reserva Legal + Land Use | `MAPBIOMAS_EMAIL` + `MAPBIOMAS_PASSWORD` | `NOT_APPLICABLE` |
        | Soil Erosion + Irrigation + Crop Mapping | `SENTINEL_HUB_CLIENT_ID` + `SENTINEL_HUB_CLIENT_SECRET` | `NOT_APPLICABLE` |
        | CGU Sanctions | `CGU_API_KEY` | `NOT_APPLICABLE` |
        | All MODIS checkers (NDVI, Pasture, Grazing, Fire, Carbon, Phenology, Water, NPP) | — | Públicos via ORNL DAAC, sem autenticação |
        | All others | — | Públicos, sem credencial |

        ---

        ## 🔄 Intersecções Espaciais (Spatial Crosses)

        **O que são?** Alguns checkers fazem intersecções geométricas (PostGIS) para detectar problemas dentro de áreas:

        1. **CAR x PRODES Intersection** ⭐ (Mais importante)
           - Input: CAR number
           - Cruza: Geometria do CAR (propriedade) com polígonos PRODES (desmatamento)
           - Retorna: Área desmatada dentro da propriedade, anos, número de polígonos
           - Severity: CRITICAL se desmatamento recente (≤2 anos) ou área grande (≥100 ha)

        2. **CAR x MapBiomas Alerta**
           - Input: CAR number
           - Cruza: Geometria do CAR com alertas validados MapBiomas
           - Retorna: Alertas de desmatamento dentro da propriedade

        3. **CAR x Queimadas**
           - Input: CAR number
           - Cruza: Geometria do CAR com focos de calor (últimos 90 dias)
           - Retorna: Número de focos dentro da propriedade

        4. **CAR x ANA Outorgas**
           - Input: CAR number
           - Cruza: Geometria do CAR com pontos de outorga
           - Retorna: Outorgas dentro ou próximas à propriedade

        5. **COORDINATES x PRODES/TIs/UCs/etc**
           - Input: COORDINATES ou ADDRESS (geocoded)
           - Verifica: Se ponto cai dentro de polígonos de restrição

        **Tecnologia:** PostGIS `ST_Intersects()`, `ST_Contains()`, `ST_Within()`

        ---

        ## 🌍 Geocoding (ADDRESS)

        - Endereços são convertidos automaticamente para coordenadas
        - Provider: OpenStreetMap Nominatim (gratuito)
        - Suporta abreviações de estado (PA → Pará, SP → São Paulo, etc.)
        - Cache de 1 ano (requisições subsequentes: <100ms)
        - Rate limit: 1 req/s para geocoding (Nominatim policy)

        ---

        ## ⚡ Performance

        - Primeira requisição: ~200ms (CNPJ/CPF/CAR), ~1-2s (ADDRESS c/ geocoding)
        - Com cache: ~10ms (checkers), ~100ms (ADDRESS cached)
        - Cache TTL: 7 dias (checkers), 1 ano (geocoding)
        - **Checkers executam em paralelo** (não sequencial)

        **Rate limit:** 10,000 requisições/minuto por API key
      operationId: executeCheck
      security:
        - ApiKeyAuth: []
