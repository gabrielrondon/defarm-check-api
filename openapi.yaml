openapi: 3.0.3
info:
  title: DeFarm Check API
  description: |
    API de verificação de compliance socioambiental multi-país para o agronegócio.

    Agrega múltiplas fontes de dados públicos governamentais para validar conformidade
    de produtores, propriedades e produtos rurais.

    **Países suportados:**
    - 🇧🇷 Brasil (CNPJ, CPF, CAR, Coordenadas)
    - 🇺🇾 Uruguai (RUC, CI, Coordenadas)
    - 🇦🇷 Argentina (CUIT, CUIL, Coordenadas)
    - 🇵🇾 Paraguai (RUC_PY, CI_PY, Coordenadas)
    - 🇧🇴 Bolívia (NIT_BO, CI_BO, Coordenadas)
    - 🇨🇱 Chile (RUT, Coordenadas)
    - 🇨🇴 Colômbia (NIT_CO, CC_CO, Coordenadas)
    - 🇵🇪 Peru (RUC_PE, DNI_PE, Coordenadas)

    **Fontes de dados - Brasil:**
    - Lista Suja do Trabalho Escravo (MTE) - 678 registros
    - Embargos Ambientais (IBAMA) - 65,953 documentos
    - Desmatamento Histórico (PRODES/INPE) - Dados geoespaciais anuais
    - Alertas de Desmatamento em Tempo Real (DETER/INPE) - Alertas diários últimos 90 dias
    - Terras Indígenas (FUNAI) - Todas TIs demarcadas no Brasil
    - Unidades de Conservação (ICMBio) - Todas UCs federais, estaduais e municipais
    - Cadastro Ambiental Rural (CAR/SICAR) - Cobertura nacional 27 estados
    - MapBiomas Alerta - Alertas de desmatamento validados + inteligência territorial
    - Reserva Legal Compliance (MapBiomas) - Conformidade da Reserva Legal via cruzamento CAR
    - Land Use Conversion History (MapBiomas Collection) - Trajetória uso do solo 1985-2024 + corte temporal Código Florestal
    - NDVI Productivity (NASA MODIS) - Índice de produtividade da pastagem/vegetação 🌍 global
    - Pasture Degradation Index (ORNL DAAC MODIS) - Degradação de pastagem via NDVI + queimadas 🌍 global
    - Grazing Pattern Analyzer (NASA MODIS) - Detecta eventos de pastejo, tempo de recuperação e regularidade de rotação 🌍 global
    - Fire Scar Mapping (MODIS MCD64A1) - Cicatrizes de incêndio confirmadas por satélite 🌍 global
    - Carbon Stock Estimation (MODIS MOD44B) - Estimativa de biomassa e carbono estocado 🌍 global
    - Productivity vs Regional Benchmark (MODIS MOD17A3HGF) - NPP vs benchmark do bioma 🌍 global
    - Phenology & Crop Cycles (MODIS MCD12Q2) - Ciclos agrícolas e fenologia 🌍 global
    - Water Body Monitoring (MODIS MCD12Q1) - Monitoramento de corpos d'água 🌍 global
    - Soil Erosion Risk (Sentinel-2 BSI) - Risco de erosão e solo exposto 🌍 global
    - Irrigation Detection (Sentinel-2 NDMI) - Irrigação na estação seca 🌍 global
    - Crop Mapping (Sentinel-2 NDVI) - Classificação de cobertura e ciclos agrícolas 🌍 global

    **Fontes de dados - Uruguai:**
    - SNAP - Sistema Nacional de Áreas Protegidas (MVOTMA)
    - DICOSE - Registro Rural/Pecuário (MGAP)

    **Documentação completa:** https://github.com/gabrielrondon/defarm-check-api
