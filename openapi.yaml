  /samples/snap:
    get:
      tags:
        - samples
      summary: Get samples from SNAP Protected Areas (Uruguay)
      description: |
        Retorna até 10 coordenadas aleatórias dentro de áreas protegidas do **SNAP**
        (Sistema Nacional de Áreas Protegidas) do Uruguai.

        **Dados:** Parques nacionais, reservas naturais e paisagens protegidas (MVOTMA).

        **Input types suportados:** COORDINATES (com `country: UY`)

        **Uso:**
        Use as coordenadas retornadas para testar o endpoint `/check`.
        A API retorna FAIL quando as coordenadas estão dentro de uma área SNAP.

        **Exemplo de request:**
        ```json
        POST /check
        {
          "input": {
            "type": "COORDINATES",
            "value": { "lat": -34.4711, "lon": -56.1945 },
            "country": "UY"
          }
        }
        ```

        **Response:** Cada sample inclui nome da área, categoria, área (ha),
        departamento e coordenadas do centróide.
      operationId: getSamplesSnap
      security: []
      responses:
        '200':
          description: Samples SNAP retornados
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                    example: "SNAP - Sistema Nacional de Áreas Protegidas (Uruguay)"
                  country:
                    type: string
                    example: "UY"
                  count:
                    type: integer
                    example: 10
                  message:
                    type: string
                    nullable: true
                  samples:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: "Parque Nacional Cabo Polonio"
                        category:
                          type: string
                          example: "Parque Nacional"
                        areaHa:
                          type: number
                          example: 7900
                        department:
                          type: string
                          example: "Rocha"
                        municipality:
                          type: string
                          nullable: true
                        legalStatus:
                          type: string
                          example: "Vigente"
                        establishedDate:
                          type: string
                          nullable: true
                        coordinates:
                          type: object
                          properties:
                            lat:
                              type: number
                              example: -34.4711
                            lon:
                              type: number
                              example: -56.1945
                        testUrl:
                          type: string
                          example: 'POST /check {"input":{"type":"COORDINATES","value":{"lat":-34.4711,"lon":-56.1945},"country":"UY"}}'

  /samples/dicose:
    get:
      tags:
        - samples
      summary: Get samples from DICOSE Livestock Registry (Uruguay)
      description: |
        Retorna até 10 documentos uruguaios (RUC ou CI) com declarações **DICOSE**
        dos últimos 2 anos.

        **DICOSE** (Declaración Jurada de Existencias de Ganado) é o censo pecuário
        oficial do Uruguai, gerenciado pelo MGAP. Registra todos os estabelecimentos
        rurais e seus rebanhos bovinos, ovinos e equinos.

        Produtores presentes no DICOSE são considerados **registrados/conformes** —
        indicador **positivo**. Ausência de declaração pode indicar não-conformidade.

        **Tipos de documento:**
        - **RUC** (12 dígitos): Registro Único de Contribuyentes (empresa/pessoa jurídica)
        - **CI** (7–8 dígitos): Cédula de Identidad (pessoa física)

        **Exemplo de request:**
        ```json
        POST /check
        {
          "input": {
            "type": "RUC",
            "value": "210000000001",
            "country": "UY"
          }
        }
        ```

        **Response:** Cada sample inclui documento, tipo (RUC/CI), nome do produtor,
        ano da declaração, área (ha), departamento e resumo do rebanho.
      operationId: getSamplesDicose
      security: []
      responses:
        '200':
          description: Samples DICOSE retornados
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                    example: "DICOSE - Rural/Livestock Registry (Uruguay)"
                  country:
                    type: string
                    example: "UY"
                  count:
                    type: integer
                    example: 10
                  message:
                    type: string
                    nullable: true
                  samples:
                    type: array
                    items:
                      type: object
                      properties:
                        document:
                          type: string
                          description: RUC (12 dígitos) ou CI (7–8 dígitos)
                          example: "210000000001"
                        documentType:
                          type: string
                          enum: [RUC, CI]
                          example: "RUC"
                        producerName:
                          type: string
                          nullable: true
                          example: "Estancia El Ombú"
                        establishmentId:
                          type: string
                          nullable: true
                          example: "D-12345"
                        year:
                          type: integer
                          example: 2024
                        areaHa:
                          type: number
                          nullable: true
                          example: 850.0
                        department:
                          type: string
                          nullable: true
                          example: "Tacuarembó"
                        section:
                          type: string
                          nullable: true
                          example: "3"
                        activity:
                          type: string
                          nullable: true
                          example: "Ganadería"
                        livestockSummary:
                          type: string
                          example: "500 bovinos, 200 ovinos"
                        declarationStatus:
                          type: string
                          nullable: true
                          example: "PRESENTADA"
                        testUrl:
                          type: string
                          example: 'POST /check {"input":{"type":"RUC","value":"210000000001","country":"UY"}}'

