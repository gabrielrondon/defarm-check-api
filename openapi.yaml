                message: "Invalid input type. Must be one of: CNPJ, CPF, CAR, IE, RUC, CI, COORDINATES, ADDRESS, NAME"
                statusCode: 400
        '401':
          description: Unauthorized - API key inválida ou ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
                message: "Missing API key. Include X-API-Key header."
                statusCode: 401
        '429':
          description: Too Many Requests - Rate limit excedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Too Many Requests"
                message: "Rate limit exceeded. Maximum 10,000 requests per minute."
                statusCode: 429
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Internal Server Error"
                message: "An unexpected error occurred"
                statusCode: 500

