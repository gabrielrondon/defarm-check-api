        Retorna até 10 coordenadas aleatórias com alertas DETER recentes (últimos 90 dias).

        **Dados:** Alertas de desmatamento em tempo real do INPE/TerraBrasilis.

        **Input types suportados:** COORDINATES, ADDRESS (via geocoding)

        **Uso:**
        Use as coordenadas retornadas (centróide de cada alerta) para testar o endpoint `/check`.
        API retorna FAIL quando coordenadas caem próximas a alertas DETER recentes.

        **⚠️ Nota importante:**
        Se `count: 0`, significa que a API INPE/TerraBrasilis está temporariamente indisponível.
        Neste caso, o endpoint retorna um `message` explicativo. Isso é esperado e
        não bloqueante - o checker retorna PASS quando não há dados disponíveis.

        **Response:** Cada sample inclui data do alerta, área (ha), município, estado,
        classificação, sensor e coordenadas do centróide.
      operationId: getSamplesDeter
      security: []
      responses:
        '200':
          description: 10 samples retornados
          content:
            application/json:
              schema:
                type: object

  /samples/car:
    get:
      tags:
        - samples
      summary: Get CAR registrations with irregular status
      description: |
        Retorna até 10 registros CAR (Cadastro Ambiental Rural) com status irregular **e geometria válida**.

        **Dados:** 8,096,127 registros CAR de 27 estados brasileiros (SICAR).

        **Input types suportados:** CAR (código completo), COORDINATES, ADDRESS (via geocoding)

        **Status Codes SICAR:**
        - `CA` (CANCELADO): Registro cancelado
        - `SU` (SUSPENSO): Registro suspenso por irregularidades
        - `PE` (PENDENTE): Registro pendente de validação

        **Uso:**
        Use o `carNumber` retornado para testar o endpoint `/check` com input type CAR.
        Também retorna coordenadas do centróide para testes espaciais.
        API retorna FAIL quando CAR está cancelado ou suspenso.

        **Garantia de geometria:**
        Este endpoint **nunca** retorna samples com geometria vazia. A query filtra
        `geometry IS NOT NULL` e `NOT ST_IsEmpty(geometry)`.
        Se não houver CAR irregular com geometria válida, retorna amostras com
        **qualquer status** que tenham geometria válida e inclui um `message`
        explicando o fallback.

        **⚠️ Fix aplicado (2026-02-02):**
        Query SQL corrigido para usar códigos SICAR (CA/SU/PE) ao invés de nomes completos.
        Adicionado campo `statusDescription` para mapear códigos → nomes legíveis.

        **Response:** Cada sample inclui carNumber, status (código), statusDescription (legível),
        área (ha), município, estado e coordenadas do centróide.

        Se `count: 0`, significa que não há CARs com geometria válida no momento
        (ou dados em processamento). Neste caso retorna `message` explicativo.
      operationId: getSamplesCar
      security: []
      responses:
        '200':
          description: Lista de CAR samples com status irregular (ou mensagem explicativa se vazio)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SampleResponse'
                  - type: object
                    properties:
                      samples:
                        type: array
                        items:
                          $ref: '#/components/schemas/CARSample'

  /samples/prodes:
    get:
      tags:
        - samples
      summary: Get samples from PRODES Deforestation
      description: |
        Retorna 10 coordenadas aleatórias com desmatamento histórico detectado pelo PRODES.

        **Dados:** 216,252 polígonos de desmatamento de todos os 6 biomas brasileiros (INPE).

        **Input types suportados:** COORDINATES, ADDRESS (via geocoding)

        **Biomas cobertos:**
        - Amazônia Legal (2015-2024)
        - Cerrado, Caatinga, Mata Atlântica, Pampa, Pantanal

        **Uso:**
        Use as coordenadas retornadas (centróide de cada polígono) para testar o endpoint `/check`.
        API retorna FAIL quando coordenadas caem dentro de polígono de desmatamento.
        Severity baseada na área e ano do desmatamento.

        **Response:** Cada sample inclui ano do desmatamento, área (ha), município, estado,
        path/row (referência satélite) e coordenadas do centróide.
      operationId: getSamplesProdes
      security: []
      responses:
        '200':
          description: 10 samples retornados
          content:
            application/json:
              schema:
                type: object

  /car/{carNumber}:
    get:
      tags:
        - car
      summary: Get CAR registration with polygon geometry
      description: |
        Retorna dados de um registro CAR (Cadastro Ambiental Rural) incluindo metadados
        e geometria do polígono da propriedade.

        **Dados:** 3.5M+ registros CAR de 20 estados brasileiros (SICAR).

        **Query Parameters:**
        - `includeGeometry` (boolean, default: true): Incluir geometria do polígono

        **Response:**
        - Metadados: carNumber, status, owner info, área, município, estado
        - Geometry: Polígono MultiPolygon em formato GeoJSON (se includeGeometry=true)

        **Uso:**
        - Display CAR property boundaries on maps
        - Verify property ownership and status
        - Export CAR geometries for GIS analysis
      operationId: getCarByNumber
      parameters:
        - name: carNumber
          in: path
          required: true
          description: CAR registration number (e.g., AC-1200013-XXXXXXXX)
          schema:
            type: string
            example: AC-1200013-XXXXXXXX
        - name: includeGeometry
          in: query
          required: false
          description: Include polygon geometry (default true)
          schema:
            type: boolean
            default: true
      security: []
      responses:
        '200':
          description: CAR registration found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CARRegistration'
        '404':
          description: CAR not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Not Found
                  message:
                    type: string
                    example: CAR registration not found
                  carNumber:
                    type: string
                    example: XX-9999999-XXXXXXXX

  /car/{carNumber}/geojson:
    get:
      tags:
        - car
      summary: Get CAR geometry as GeoJSON
      description: |
        Retorna **apenas a geometria** do CAR como GeoJSON (Polygon/MultiPolygon),
        pronta para renderização direta em mapas (Leaflet, Mapbox, Google Maps, etc).

        **Response:** GeoJSON Geometry com:
        - `type`: "Polygon" ou "MultiPolygon"
        - `coordinates`: array de coordenadas GeoJSON

        **Uso:**
        - Direct integration with mapping libraries
        - Export CAR boundary as GeoJSON file
        - Combine multiple geometrias em FeatureCollection (client-side)

        **Sem geometria:**
        Se o CAR não tiver geometria válida, retorna `404` com mensagem explicativa.
      operationId: getCarGeoJSON
      parameters:
        - name: carNumber
          in: path
          required: true
          description: CAR registration number
          schema:
            type: string
            example: AC-1200013-XXXXXXXX
      security: []
      responses:
        '200':
          description: GeoJSON Geometry returned
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum: [Polygon]
                      coordinates:
                        type: array
                    additionalProperties: true
                  - type: object
                    required:
                      - type
                      - coordinates
                    properties:
                      type:
                        type: string
                        enum: [MultiPolygon]
                      coordinates:
                        type: array
                    additionalProperties: true
        '404':
          description: CAR not found or geometry not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /car/batch:
    post:
      tags:
        - car
      summary: Batch query multiple CAR registrations
      description: |
        Consulta múltiplos registros CAR de uma vez (até 100 por requisição).

        **Body Parameters:**
        - `carNumbers` (array, required): Array de números CAR (máximo 100)
        - `includeGeometry` (boolean, default: false): Incluir geometrias dos polígonos

        **Response:**
        - `count`: Número de CARs encontrados
        - `requested`: Número de CARs solicitados
        - `cars`: Array com dados dos CARs encontrados

        **⚠️ Nota:** Batch requests por padrão NÃO incluem geometrias (`includeGeometry=false`)
        para evitar respostas muito grandes. Use `includeGeometry=true` apenas se necessário.

        **Uso:**
        - Bulk verification of CAR registrations
        - Generate reports for multiple properties
        - Map multiple CAR boundaries at once
      operationId: batchGetCars
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - carNumbers
              properties:
                carNumbers:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  description: Array of CAR registration numbers (max 100)
                  example: ["AC-1200013-XXXXXXXX", "MT-5100048-YYYYYYYY"]
                includeGeometry:
                  type: boolean
                  default: false
                  description: Include polygon geometries (default false)
      security: []
      responses:
        '200':
          description: Batch query results
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Number of CARs found
                  requested:
                    type: integer
                    description: Number of CARs requested
                  cars:
                    type: array
                    items:
                      $ref: '#/components/schemas/CARRegistration'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key para autenticação. Formato: `ck_` + 64 caracteres hexadecimais.

        Entre em contato com o time DeFarm para obter uma API key.

        **Rate limit:** 10,000 requisições/minuto por key.

  schemas:
    Country:
      type: string
      enum:
        - BR
        - UY
        - AR
        - PY
        - BO
        - CL
        - CO
        - PE
      description: |
        Código do país (ISO 3166-1 alpha-2).
        Países suportados:
        - **BR**: Brasil
        - **UY**: Uruguai
        - **AR**: Argentina
        - **PY**: Paraguai
        - **BO**: Bolívia
        - **CL**: Chile
        - **CO**: Colômbia
        - **PE**: Peru

    CheckRequest:
      type: object
      required:
        - input
      properties:
        input:
          type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              enum:
                - CNPJ
                - CPF
                - CAR
                - IE
                - RUC
                - CI
                - CUIT
                - CUIL
                - RUC_PY
                - CI_PY
                - NIT_BO
                - CI_BO
                - RUT
                - NIT_CO
                - CC_CO
                - RUC_PE
                - DNI_PE
                - COORDINATES
                - ADDRESS
                - NAME
              description: |
                Tipo do input a ser verificado:

                **Brasil:**
                - **CNPJ**: CNPJ brasileiro (14 dígitos)
                - **CPF**: CPF brasileiro (11 dígitos)
                - **CAR**: Cadastro Ambiental Rural
                - **IE**: Inscrição Estadual

                **Uruguai:**
                - **RUC**: Registro Único de Contribuyentes (12 dígitos)
                - **CI**: Cédula de Identidad (7–8 dígitos)

                **Argentina:**
                - **CUIT**: Clave Única de Identificación Tributaria (11 dígitos)
                - **CUIL**: Clave Única de Identificación Laboral (11 dígitos)

                **Paraguai:**
                - **RUC_PY**: Registro Único del Contribuyente (6–11 dígitos)
                - **CI_PY**: Cédula de Identidad paraguaya (7–8 dígitos)

                **Bolívia:**
                - **NIT_BO**: Número de Identificación Tributaria (7–13 dígitos)
                - **CI_BO**: Cédula de Identidad boliviana (7 dígitos)

                **Chile:**
                - **RUT**: Rol Único Tributario (XXXXXXXX-X, com dígito verificador)

                **Colômbia:**
                - **NIT_CO**: Número de Identificación Tributaria (9–10 dígitos)
                - **CC_CO**: Cédula de Ciudadanía (8–10 dígitos)

                **Peru:**
                - **RUC_PE**: Registro Único de Contribuyentes (11 dígitos)
                - **DNI_PE**: Documento Nacional de Identidad (8 dígitos)

                **Universal:**
                - **COORDINATES**: Coordenadas geográficas (lat/lon WGS84)
                - **ADDRESS**: Endereço em texto livre em qualquer país (geocodificado automaticamente via Nominatim)
                - **NAME**: Nome da empresa/produtor
            country:
              type: string
              enum:
                - BR
                - UY
                - AR
                - PY
                - BO
                - CL
                - CO
                - PE
              description: |
                Código do país (ISO 3166-1 alpha-2). Opcional — detectado automaticamente
                pelo tipo de documento:
                - CNPJ/CPF/CAR/IE → BR
                - RUC/CI → UY
                - CUIT/CUIL → AR
                - RUC_PY/CI_PY → PY
                - NIT_BO/CI_BO → BO
                - RUT → CL
                - NIT_CO/CC_CO → CO
                - RUC_PE/DNI_PE → PE
                - COORDINATES/ADDRESS/NAME → obrigatório quando não-BR
              example: AR
            value:
              oneOf:
                - type: string
                  description: |
                    CNPJ, CPF, CAR (com ou sem formatação) ou ADDRESS (endereço brasileiro em texto livre).

                    Exemplos de endereço:
                    - "São Paulo, SP"
                    - "Altamira, Pará"
                    - "Brasília, DF"
                    - "Rua Augusta 123, São Paulo"

                    Endereços são geocodificados automaticamente para coordenadas usando OpenStreetMap Nominatim.
                - type: object
                  description: Coordenadas geográficas
                  required:
                    - lat
                    - lon
                  properties:
                    lat:
                      type: number
                      format: float
                      minimum: -90
                      maximum: 90
                      description: Latitude em decimal (WGS84)
                    lon:
                      type: number
                      format: float
                      minimum: -180
                      maximum: 180
                      description: Longitude em decimal (WGS84)
        options:
          type: object
          description: Opções adicionais para a verificação
          properties:
            sources:
              type: array
              items:
                type: string
              description: Lista de checkers específicos a executar (opcional)
            useCache:
              type: boolean
              default: true
              description: Usar cache para acelerar resposta
            includeEvidence:
              type: boolean
              default: true
              description: Incluir evidências e links para fontes
            timeout:
              type: integer
              default: 30000
              description: Timeout em milissegundos para cada checker

    CheckResponse:
      type: object
      required:
        - checkId
        - input
        - timestamp
        - verdict
        - score
        - sources
        - summary
        - metadata
      properties:
        checkId:
          type: string
          format: uuid
          description: ID único da verificação
        input:
          type: object
          properties:
            type:
              type: string
            value:
              oneOf:
                - type: string
                - type: object
          description: Input original da requisição
        timestamp:
          type: string
          format: date-time
          description: Data/hora da verificação (ISO 8601)
        verdict:
          type: string
          enum:
            - COMPLIANT
            - NON_COMPLIANT
            - PARTIAL
            - UNKNOWN
          description: |
            Veredito final agregado:
            - `COMPLIANT`: Totalmente conforme (score = 100)
            - `NON_COMPLIANT`: Não conforme (score < 80)
            - `PARTIAL`: Parcialmente conforme (80 ≤ score < 100)
            - `UNKNOWN`: Erro ao executar verificação
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Score de compliance (0-100):
            - 100 = Totalmente conforme
            - 80-99 = Parcialmente conforme
            - 0-79 = Não conforme
        sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceResult'
          description: Resultado de cada checker executado
        summary:
          type: object
          required:
            - totalCheckers
            - passed
            - failed
            - warnings
            - errors
          properties:
            totalCheckers:
              type: integer
              description: Total de checkers executados
            passed:
              type: integer
              description: Checkers que passaram (PASS)
            failed:
              type: integer
              description: Checkers que falharam (FAIL)
            warnings:
              type: integer
              description: Checkers com alertas (WARNING)
            errors:
              type: integer
              description: Checkers com erro de execução
            notApplicable:
              type: integer
              description: Checkers não aplicáveis ao input
        insights:
          $ref: '#/components/schemas/CheckInsights'
        metadata:
          type: object
          required:
            - processingTimeMs
            - cacheHitRate
            - apiVersion
            - timestamp
          properties:
            processingTimeMs:
              type: integer
              description: Tempo total de processamento em ms
            cacheHitRate:
              type: number
              format: float
              minimum: 0
              maximum: 1
              description: Taxa de cache hits (0-1)
            apiVersion:
              type: string
              description: Versão da API
            timestamp:
              type: string
              format: date-time

    SourceResult:
      type: object
      required:
        - name
        - category
        - status
        - message
      properties:
        name:
          type: string
          description: Nome da fonte/checker
        category:
          type: string
          enum:
            - social
            - environmental
            - legal
          description: Categoria do checker
        status:
          type: string
          enum:
            - PASS
            - FAIL
            - WARNING
            - ERROR
            - NOT_APPLICABLE
          description: |
            Status do check:
            - `PASS`: Conforme (nenhum problema encontrado)
            - `FAIL`: Não conforme (problema detectado)
            - `WARNING`: Alerta (atenção necessária)
            - `ERROR`: Erro ao executar checker
            - `NOT_APPLICABLE`: Checker não aplicável ao input
        severity:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
          description: |
            Severidade do problema (apenas quando status = FAIL):
            - `LOW`: Problema menor
            - `MEDIUM`: Problema moderado
            - `HIGH`: Problema grave
            - `CRITICAL`: Problema crítico (bloqueante)
        message:
          type: string
          description: Mensagem descritiva do resultado
        details:
          type: object
          description: Detalhes específicos do resultado (varia por checker)
        indicators:
          type: array
          description: Indicadores operacionais L1 derivados do checker/fonte
          items:
            $ref: '#/components/schemas/L1Indicator'
        evidence:
          type: object
          properties:
            dataSource:
              type: string
              description: Nome da fonte de dados oficial
            url:
              type: string
              format: uri
              description: URL da fonte de dados
            lastUpdate:
              type: string
              format: date
              description: Data da última atualização dos dados
            raw:
              type: object
              description: Dados brutos da fonte (opcional)
        executionTimeMs:
          type: integer
          description: Tempo de execução do checker em ms
        cached:
          type: boolean
          description: Se o resultado veio do cache

    L1Indicator:
      type: object
      required:
        - id
        - name
        - value
      properties:
        id:
          type: string
          description: ID estável do indicador
        name:
          type: string
          description: Nome legível do indicador
        value:
          nullable: true
          oneOf:
            - type: string
            - type: number
            - type: boolean
          description: Valor do indicador (numérico, textual ou booleano)
        unit:
          type: string
          description: Unidade opcional (ex: ha, km, count, days)
        direction:
          type: string
          enum:
            - HIGHER_IS_WORSE
            - LOWER_IS_WORSE
            - NEUTRAL
          description: Direção de risco do indicador
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confiança do cálculo (0-1)
        source:
          type: string
          description: Fonte oficial do indicador

    L2DimensionScore:
      type: object
      required:
        - id
        - label
        - score
      properties:
        id:
          type: string
        label:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
        weight:
          type: number
        rationale:
          type: string

    L2Insights:
      type: object
      required:
        - version
        - dimensions
      properties:
        version:
          type: string
        dimensions:
          type: array
          items:
            $ref: '#/components/schemas/L2DimensionScore'

    CheckInsights:
      type: object
      properties:
        l2:
          $ref: '#/components/schemas/L2Insights'

    SourceInfo:
      type: object
      required:
        - name
        - category
        - enabled
        - status
        - description
      properties:
        name:
          type: string
          description: Nome da fonte de dados
        category:
          type: string
          enum:
            - social
            - environmental
            - legal
          description: Categoria da fonte
        enabled:
          type: boolean
          description: Se a fonte está habilitada
        status:
          type: string
          enum:
            - operational
            - down
            - maintenance
          description: Status operacional da fonte
        description:
          type: string
          description: Descrição da fonte e o que ela verifica

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
        - services
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - down
          description: Status geral da API
        timestamp:
          type: string
          format: date-time
          description: Data/hora da verificação
        version:
          type: string
          description: Versão da API
        services:
          type: object
          required:
            - database
            - redis
          properties:
            database:
              type: string
              enum:
                - ok
                - down
              description: Status do PostgreSQL + PostGIS
            redis:
              type: string
              enum:
                - ok
                - down
              description: Status do Redis (cache)

    SampleResponse:
      type: object
      description: Response padrão para endpoints /samples/*
      required:
        - source
        - count
        - samples
      properties:
        source:
          type: string
          description: Nome da fonte de dados
          example: "CAR - Cadastro Ambiental Rural (SICAR)"
        count:
          type: integer
          description: Número de samples retornados (0-10)
          minimum: 0
          maximum: 10
          example: 10
        message:
          type: string
          nullable: true
          description: |
            Mensagem explicativa quando count=0.
            Indica que APIs governamentais estão offline (não bloqueante).
          example: "Dados em processamento. API temporariamente indisponível."
        samples:
          type: array
          description: Lista de samples (vazio se count=0)
          items:
            type: object

    CARSample:
      type: object
      description: Sample de registro CAR com status irregular
      required:
        - carNumber
        - status
        - statusDescription
        - areaHa
        - municipality
        - state
        - coordinates
        - testUrl
      properties:
        carNumber:
          type: string
          description: Código único do registro CAR (formato UF-MUNICÍPIO-CÓDIGO)
          example: "PR-4111506-1B80A47993684BEE9908ED4468199BF8"
        status:
          type: string
          enum: [CA, SU, PE, AT]
          description: Código de status SICAR
          example: "CA"
        statusDescription:
          type: string
          enum: [CANCELADO, SUSPENSO, PENDENTE, ATIVO]
          description: Descrição legível do status
          example: "CANCELADO"
        areaHa:
          type: integer
          description: Área do imóvel em hectares
          example: 150
        municipality:
          type: string
          description: Município do imóvel
          example: "Ivaipora"
        state:
          type: string
          description: Sigla do estado (UF)
          example: "PR"
        coordinates:
          type: object
          description: Coordenadas do centróide da propriedade
          required:
            - lat
            - lon
          properties:
            lat:
              type: number
              format: float
              description: Latitude (WGS84)
              example: -24.33476771879231
            lon:
              type: number
              format: float
              description: Longitude (WGS84)
              example: -51.587721288619306
        testUrl:
          type: string
          description: URL de exemplo para testar no endpoint /check
          example: 'POST /check {"input":{"type":"CAR","value":"PR-4111506-..."}}'

    CARRegistration:
      type: object
      description: Registro CAR completo com metadados e geometria opcional
      required:
        - carNumber
        - state
      properties:
        carNumber:
          type: string
          description: Código único do registro CAR (formato UF-MUNICÍPIO-CÓDIGO)
          example: "AC-1200013-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
        status:
          type: string
          enum: [AT, PE, CA, SU]
          description: |
            Status do registro CAR:
            - AT (ATIVO): Registro ativo e válido
            - PE (PENDENTE): Pendente de validação
            - CA (CANCELADO): Registro cancelado
            - SU (SUSPENSO): Registro suspenso
          example: "AT"
        ownerDocument:
          type: string
          nullable: true
          description: CPF ou CNPJ do proprietário
          example: "12345678901"
        ownerName:
          type: string
          nullable: true
          description: Nome do proprietário
          example: "João da Silva"
        propertyName:
          type: string
          nullable: true
          description: Nome da propriedade rural
          example: "Fazenda Esperança"
        areaHa:
          type: integer
          nullable: true
          description: Área total do imóvel em hectares
          example: 1234
        state:
          type: string
          description: Sigla do estado (UF)
          example: "AC"
        municipality:
          type: string
          nullable: true
          description: Nome do município
          example: "Acrelandia"
        source:
          type: string
          description: Fonte dos dados
          default: "SICAR"
          example: "SICAR"
        createdAt:
          type: string
          format: date-time
          description: Data de criação do registro no banco
          example: "2024-01-15T10:30:00.000Z"
        geometry:
          type: object
          nullable: true
          description: |
            Geometria do polígono da propriedade em formato GeoJSON.
            Retornado apenas se `includeGeometry=true`.
          properties:
            type:
              type: string
              enum: [MultiPolygon]
            coordinates:
              type: array
              description: Array de coordenadas do MultiPolygon
              items:
                type: array
          example:
            type: "MultiPolygon"
            coordinates: [[[[...]]]]

    Error:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          description: Nome do erro
        message:
          type: string
          description: Mensagem descritiva do erro
        statusCode:
          type: integer
          description: Código HTTP do erro
        details:
          type: array
          items:
            type: object
          description: Detalhes adicionais (validação, etc)
